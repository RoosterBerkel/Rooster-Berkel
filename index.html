<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Rooster Berkel</title>
</head>
<body>

<h1>Rooster Berkel</h1>

<h2>Login</h2>
<input id="name" placeholder="Naam">
<button onclick="login()">Inloggen</button>

<div id="app" style="display:none;">
  <h2>Rooster</h2>

  <div>
    Maandag - Receptioniste:
    <select id="ma_receptie">
      <option>Helga</option>
      <option>Christiane</option>
      <option>Ciska</option>
    </select>
  </div>

  <h2>Vrij aanvragen</h2>
  <button onclick="requestDayOff()">Vraag vrije dag aan</button>

  <h2>Historie</h2>
  <div id="history"></div>
</div>

<script>
let user = "";

function login() {
  user = document.getElementById("name").value;
  document.getElementById("app").style.display = "block";
}

function requestDayOff() {
  const msg = user + " vraagt een vrije dag aan";
  document.getElementById("history").innerHTML += "<p>" + msg + "</p>";
  alert("Mail gestuurd naar Sandra");
}
</script>

</body>
</html>
